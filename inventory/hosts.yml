---
all:
  children:

    # --- Monitoring platform nodes (run Prometheus, Alertmanager, Grafana) ---
    monitoring:
      hosts:
        monitor-node-01:
          ansible_host: 10.0.1.73
          prometheus_replica_label: a

    # --- Linux hosts: Node Exporter is deployed to all of these ---
    linux_nodes:
      hosts:
        pNode1:
          ansible_host: 10.8.50.58
          ansible_user: ubuntu
        pNode2:
          ansible_host: 10.8.50.54
          ansible_user: ubuntu
        pNode3:
          ansible_host: 10.8.50.85
          ansible_user: debian
        pNode4:
          ansible_host: 10.8.50.76
          ansible_user: fedora

    # --- PostgreSQL hosts: postgres_exporter is deployed here ---
    postgres_servers:
      hosts: {}

    # --- Proxmox VE nodes: scraped via prometheus-pve-exporter ---
    proxmox_nodes:
      hosts: {}

    # --- MAAS region controllers: scraped directly on :5240 ---
    maas_controllers:
      hosts: {}

    # --- SNMP switches: scraped via snmp_exporter on monitoring nodes ---
    snmp_switches:
      hosts:
        zs4128-a:
          ansible_host: 10.8.50.202
        zs4128-b:
          ansible_host: 10.8.50.201
        zs4128-c:
          ansible_host: 10.8.50.200
