---
- name: Create node_exporter system group
  ansible.builtin.group:
    name: node_exporter
    system: true
    state: present

- name: Create node_exporter system user
  ansible.builtin.user:
    name: node_exporter
    group: node_exporter
    system: true
    shell: /sbin/nologin
    createhome: false
    state: present

- name: Ensure curl is installed on Debian-family hosts
  ansible.builtin.apt:
    name: curl
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Ensure curl is installed on RedHat-family hosts
  ansible.builtin.dnf:
    name: curl
    state: present
  when: ansible_os_family == "RedHat"

- name: Download node_exporter with curl (workaround for get_url TLS client issue)
  ansible.builtin.command:
    cmd: >-
      curl -fL --retry 3 --connect-timeout 10
      -o /tmp/node_exporter-{{ node_exporter_version }}.tar.gz
      https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
  args:
    creates: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: root
    group: root
    mode: '0755'
    remote_src: true
  notify: Restart node_exporter

- name: Deploy node_exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
