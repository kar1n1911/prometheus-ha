---
- name: Create node_exporter system group
  ansible.builtin.group:
    name: node_exporter
    system: true
    state: present

- name: Create node_exporter system user
  ansible.builtin.user:
    name: node_exporter
    group: node_exporter
    system: true
    shell: /sbin/nologin
    createhome: false
    state: present

- name: Ensure curl is installed on Debian-family hosts
  ansible.builtin.apt:
    name: curl
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Ensure curl is installed on RedHat-family hosts
  ansible.builtin.dnf:
    name: curl
    state: present
  when: ansible_os_family == "RedHat"

- name: Ensure htpasswd tooling is installed for generated node_exporter basic auth on Debian-family hosts
  ansible.builtin.apt:
    name: apache2-utils
    state: present
    update_cache: true
  when:
    - ansible_os_family == "Debian"
    - node_exporter_basic_auth_username is defined
    - node_exporter_basic_auth_password is defined
    - node_exporter_basic_auth_password_hash is not defined

- name: Ensure htpasswd tooling is installed for generated node_exporter basic auth on RedHat-family hosts
  ansible.builtin.dnf:
    name: httpd-tools
    state: present
  when:
    - ansible_os_family == "RedHat"
    - node_exporter_basic_auth_username is defined
    - node_exporter_basic_auth_password is defined
    - node_exporter_basic_auth_password_hash is not defined

- name: Download node_exporter with curl (workaround for get_url TLS client issue)
  ansible.builtin.command:
    cmd: >-
      curl -fL --retry 3 --connect-timeout 10
      -o /tmp/node_exporter-{{ node_exporter_version }}.tar.gz
      https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
  args:
    creates: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: root
    group: root
    mode: '0755'
    remote_src: true
  notify: Restart node_exporter

- name: Create node_exporter config directory
  ansible.builtin.file:
    path: /etc/node_exporter
    state: directory
    owner: node_exporter
    group: node_exporter
    mode: '0750'
  when: node_exporter_basic_auth_username is defined and (node_exporter_basic_auth_password is defined or node_exporter_basic_auth_password_hash is defined)

- name: Check existing node_exporter web config
  ansible.builtin.stat:
    path: /etc/node_exporter/web.yml
  register: node_exporter_web_config_stat
  when:
    - node_exporter_basic_auth_username is defined
    - node_exporter_basic_auth_password is defined
    - node_exporter_basic_auth_password_hash is not defined

- name: Generate node_exporter basic auth bcrypt hash
  ansible.builtin.command:
    argv:
      - htpasswd
      - -nbB
      - -C
      - "{{ node_exporter_basic_auth_bcrypt_cost | default(12) | string }}"
      - "{{ node_exporter_basic_auth_username }}"
      - "{{ node_exporter_basic_auth_password }}"
  register: node_exporter_basic_auth_generated
  changed_when: false
  no_log: true
  when:
    - node_exporter_basic_auth_username is defined
    - node_exporter_basic_auth_password is defined
    - node_exporter_basic_auth_password_hash is not defined
    - node_exporter_basic_auth_force_regenerate | default(false) | bool or not node_exporter_web_config_stat.stat.exists

- name: Store generated node_exporter basic auth bcrypt hash
  ansible.builtin.set_fact:
    node_exporter_basic_auth_generated_password_hash: "{{ node_exporter_basic_auth_generated.stdout.split(':', 1)[1] }}"
  no_log: true
  when:
    - node_exporter_basic_auth_generated is not skipped

- name: Deploy node_exporter web config from provided bcrypt hash
  ansible.builtin.template:
    src: web.yml.j2
    dest: /etc/node_exporter/web.yml
    owner: node_exporter
    group: node_exporter
    mode: '0640'
  no_log: true
  notify: Restart node_exporter
  when:
    - node_exporter_basic_auth_username is defined
    - node_exporter_basic_auth_password_hash is defined

- name: Deploy node_exporter web config from generated bcrypt hash
  ansible.builtin.template:
    src: web.yml.j2
    dest: /etc/node_exporter/web.yml
    owner: node_exporter
    group: node_exporter
    mode: '0640'
  no_log: true
  notify: Restart node_exporter
  when:
    - node_exporter_basic_auth_generated_password_hash is defined

- name: Remove node_exporter web config when basic auth is disabled
  ansible.builtin.file:
    path: /etc/node_exporter/web.yml
    state: absent
  notify: Restart node_exporter
  when: node_exporter_basic_auth_username is not defined

- name: Deploy node_exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
